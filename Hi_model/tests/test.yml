version: "3.1"

nlu:
- intent: move_forward
  examples: |
    - आगे बढ़ो
    - सीधा चलो
    - चलते रहो
    - कृपया आगे की तरफ बढ़ो
    - व्हीलचेयर, क्या तुम आगे जा सकती हो?
    - मुझे आगे जाना है

- intent: move_backward
  examples: |
    - पीछे जाओ
    - पीछे हटो
    - रिवर्स करो
    - थोड़ा पीछे ले जाओ
    - मुझे पीछे जाना है
    - व्हीलचेयर, पीछे चलो

- intent: turn_left
  examples: |
    - बाएं मुड़ो
    - बायीं तरफ जाओ
    - लेफ्ट में जाओ
    - मुझे बाईं ओर मुड़ना है
    - कृपया बायीं दिशा में मुड़ो
    - व्हीलचेयर, बाएं घूमें

- intent: turn_right
  examples: |
    - दाएं मुड़ो
    - दायीं तरफ जाओ
    - राइट में जाओ
    - मुझे दाहिनी ओर जाना है
    - व्हीलचेयर, क्या तुम राइट जा सकती हो?
    - दाईं ओर मुड़ो

- intent: stop
  examples: |
    - रुक जाओ
    - रुको
    - वहीं रुक जाओ
    - कृपया रुक जाओ
    - अब रुक जाओ व्हीलचेयर
    - और मत चलो

- intent: speed_up
  examples: |
    - तेज चलो
    - स्पीड बढ़ाओ
    - जल्दी चलो
    - और तेज जाओ
    - व्हीलचेयर, थोड़ा तेज चलो
    - मुझे जल्दी पहुँचना है, स्पीड बढ़ाओ

- intent: slow_down
  examples: |
    - धीरे चलो
    - रफ्तार कम करो
    - स्पीड कम करो
    - थोड़ा धीरे चलो व्हीलचेयर
    - धीरे धीरे चलो
    - बहुत तेज हो रहा है, कम करो स्पीड
